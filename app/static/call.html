<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Acme Onboarding Call</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
 body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#0b0d12;color:#e6e8ee;margin:0;
      display:flex;min-height:100vh;align-items:center;justify-content:center}
 .card{width:440px;background:#141823;border:1px solid #232a3a;border-radius:18px;padding:34px;text-align:center}
 .logo{font-weight:800;color:#5b8cff;margin-bottom:6px}
 h1{font-size:20px;margin:8px 0 4px} .sub{color:#8b93a7;font-size:14px;margin:0 0 26px}
 button{background:#5b8cff;color:#fff;border:0;padding:14px 26px;border-radius:10px;font-size:15px;
        font-weight:600;cursor:pointer}
 button:disabled{opacity:.5;cursor:default}
 button.muted{background:#b3402f}
 #mute{display:none;margin-top:12px}
 .status{margin-top:22px;font-size:13px;color:#8b93a7;min-height:20px}
 .orb{width:96px;height:96px;border-radius:50%;margin:0 auto 22px;background:radial-gradient(circle at 50% 40%,#5b8cff,#22305c);
      box-shadow:0 0 0 0 rgba(91,140,255,.5);transition:transform .15s}
 .orb.live{animation:pulse 1.6s infinite}
 @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(91,140,255,.45)}70%{box-shadow:0 0 0 26px rgba(91,140,255,0)}100%{box-shadow:0 0 0 0 rgba(91,140,255,0)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">▲ ACME</div>
  <div class="orb" id="orb"></div>
  <h1>Onboarding call</h1>
  <p class="sub">Talk to your onboarding assistant. It'll set up your workspace live.</p>
  <button id="join">Start call</button>
  <button id="mute">🔇 Mute mic</button>
  <div class="status" id="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<script>
const deal = "__DEAL__";
const statusEl = document.getElementById('status');
const orb = document.getElementById('orb');
const btn = document.getElementById('join');
const muteBtn = document.getElementById('mute');
function setStatus(s){ statusEl.textContent = s; }
let activeRoom = null;
let micOn = true;

muteBtn.onclick = async () => {
  if (!activeRoom) return;
  micOn = !micOn;
  await activeRoom.localParticipant.setMicrophoneEnabled(micOn);
  muteBtn.textContent = micOn ? '🔇 Mute mic' : '🎙️ Unmute mic';
  muteBtn.classList.toggle('muted', !micOn);
  setStatus(micOn ? 'Mic live — the assistant can hear you.' : 'Muted — narrate freely; the assistant can\'t hear you.');
};

btn.onclick = async () => {
  btn.disabled = true;
  setStatus('Connecting…');
  try {
    const res = await fetch('/api/token?deal=' + encodeURIComponent(deal));
    const { token, url } = await res.json();
    const room = new LivekitClient.Room({ adaptiveStream:true });
    activeRoom = room;

    room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
      if (track.kind === 'audio') { track.attach(); orb.classList.add('live'); }
    });
    room.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, (s) => {
      orb.style.transform = s.length ? 'scale(1.08)' : 'scale(1)';
    });
    room.on(LivekitClient.RoomEvent.Disconnected, () => setStatus('Call ended.'));

    await room.connect(url, token);
    await room.localParticipant.setMicrophoneEnabled(true);
    micOn = true;
    muteBtn.style.display = 'inline-block';
    setStatus('Connected — the assistant will greet you shortly.');
  } catch (e) {
    setStatus('Error: ' + e.message);
    btn.disabled = false;
  }
};
</script>
</body>
</html>
